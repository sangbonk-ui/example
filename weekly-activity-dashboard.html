/* Toast */
.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--ink-dark);
  color: var(--ink-on-color);
  padding: 14px 24px;
  border-radius: var(--radius-pill);
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-medium);
  box-shadow: var(--shadow-modal);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  z-index: 2000;
  pointer-events: none;
}
.toast--visible {
  opacity: 1;
  transform: translateY(0);
}

/* Generate animation */
@keyframes cardRefresh {
  0%   { opacity: 1; transform: translateY(0); }
  30%  { opacity: 0; transform: translateY(8px); }
  70%  { opacity: 0; transform: translateY(-8px); }
  100% { opacity: 1; transform: translateY(0); }
}
.day-card--refreshing {
  animation: cardRefresh 0.6s ease forwards;
}

  <!-- Page Header -->
  <header class="page-header">
    <div class="page-wrapper">
      <span class="header-eyebrow">AI 시니어 학습자용</span>

      <p class="header-subtitle">매일 조금씩, AI와 함께 건강하고 즐겁게 🌿</p>
    </div>

  <!-- Actions Bar -->
  <div class="actions-bar">
    <button id="btnGenerate" class="btn btn-primary">
      <span class="btn-icon">🗓️</span> 주간 계획 생성
    </button>
    <button id="btnToday" class="btn btn-secondary">

      </div>

  <!-- Today Modal -->
  <div class="modal-overlay" id="todayModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">

        <div class="modal__title-group">

    </div>

  <script>
    const weeklyPlan = [
      { day:"월요일",dayEn:"Monday",emoji:"🌱",activities:[{category:"학습",categoryEmoji:"🤖",title:"AI란 무엇인가?",desc:"인공지능의 기본 개념을 쉬운 말로 설명한 유튜브 영상을 시청하며 AI가 일상에서 어떻게 쓰이는지 알아봅니다.",duration:"30분",time:"오전 10시"},{category:"건강",categoryEmoji:"🚶",title:"가벼운 동네 산책",desc:"아파트 단지나 공원을 천천히 걸으며 신선한 공기를 마시고 몸을 가볍게 풀어줍니다.",duration:"30분",time:"오전 9시"},{category:"뉴스",categoryEmoji:"📰",title:"AI 주간 뉴스 읽기",desc:"네이버 또는 다음 뉴스에서 'AI 인공지능' 키워드로 검색해 최신 기사 2~3편을 천천히 읽어봅니다.",duration:"20분",time:"오후 2시"},{category:"휴식&소통",categoryEmoji:"☕",title:"가족과 차 한잔",desc:"가족이나 가까운 친구에게 전화를 걸거나 함께 차를 마시며 오늘 배운 AI 이야기를 나눠봅니다.",duration:"40분",time:"오후 4시"}]},
      { day:"화요일",dayEn:"Tuesday",emoji:"💬",activities:[{category:"학습",categoryEmoji:"💡",title:"챗GPT 처음 사용해보기",desc:"ChatGPT 웹사이트에 접속해 간단한 질문 하나를 입력하고 AI가 어떻게 대답하는지 직접 체험해봅니다.",duration:"30분",time:"오전 10시"},{category:"건강",categoryEmoji:"🧘",title:"실내 스트레칭",desc:"목, 어깨, 허리를 중심으로 의자에 앉아서도 할 수 있는 간단한 스트레칭으로 몸의 긴장을 풀어줍니다.",duration:"20분",time:"오전 8시 30분"},{category:"뉴스",categoryEmoji:"📺",title:"KBS 뉴스 시청",desc:"저녁 KBS 메인 뉴스를 시청하며 국내외 주요 소식을 편안하게 파악합니다.",duration:"30분",time:"오후 9시"},{category:"휴식&소통",categoryEmoji:"🎵",title:"좋아하는 음악 감상",desc:"유튜브 뮤직이나 멜론에서 좋아하는 옛 노래를 틀어놓고 편안하게 쉬는 시간을 가집니다.",duration:"40분",time:"오후 3시"}]},
      { day:"수요일",dayEn:"Wednesday",emoji:"📖",activities:[{category:"학습",categoryEmoji:"🗣️",title:"AI 스피커 사용법 익히기",desc:"집에 있는 카카오미니나 네이버 클로바 같은 AI 스피커에게 날씨·음악·알람을 말로 요청해봅니다.",duration:"20분",time:"오전 11시"},{category:"건강",categoryEmoji:"🏊",title:"동네 수영장 또는 헬스장 방문",desc:"가까운 주민 센터 수영장이나 경로당 헬스실을 방문해 가볍게 몸을 움직여 체력을 기릅니다.",duration:"50분",time:"오전 9시"},{category:"뉴스",categoryEmoji:"🌐",title:"AI와 의료·건강 뉴스",desc:"AI가 병원에서 어떻게 활용되는지 관련 기사를 읽으며 건강과 기술의 연관성을 이해합니다.",duration:"20분",time:"오후 2시"},{category:"휴식&소통",categoryEmoji:"🃏",title:"경로당·복지관 모임 참여",desc:"동네 경로당이나 복지관에서 친구들과 화투나 보드게임을 즐기며 사회적 유대감을 나눕니다.",duration:"90분",time:"오후 3시"}]},
      { day:"목요일",dayEn:"Thursday",emoji:"📸",activities:[{category:"학습",categoryEmoji:"🖼️",title:"AI 사진 보정 앱 체험",desc:"스마트폰의 AI 사진 자동 보정 기능이나 네이버 포토 앱을 써보며 AI가 사진을 어떻게 개선하는지 경험합니다.",duration:"25분",time:"오전 10시 30분"},{category:"건강",categoryEmoji:"🌿",title:"공원 맨손 체조",desc:"가까운 공원의 운동기구를 이용하거나 맨손 체조로 관절과 근육을 부드럽게 활성화합니다.",duration:"30분",time:"오전 8시"},{category:"뉴스",categoryEmoji:"💼",title:"AI와 일자리 변화 기사 읽기",desc:"AI로 인해 바뀌는 직업 환경에 대한 기사를 읽고 자녀·손자녀의 미래를 생각해봅니다.",duration:"20분",time:"오후 1시"},{category:"휴식&소통",categoryEmoji:"📞",title:"자녀·손자녀와 영상통화",desc:"카카오톡 영상통화로 자녀나 손자녀와 얼굴을 보며 안부를 묻고 오늘 배운 AI 이야기를 공유합니다.",duration:"30분",time:"오후 5시"}]},
      { day:"금요일",dayEn:"Friday",emoji:"🔍",activities:[{category:"학습",categoryEmoji:"🛡️",title:"AI 사기·스팸 구별법 배우기",desc:"AI를 이용한 보이스피싱이나 딥페이크 사기를 알아보고 스스로를 지키는 방법을 공부합니다.",duration:"30분",time:"오전 10시"},{category:"건강",categoryEmoji:"🥗",title:"균형 잡힌 식단 준비",desc:"AI 레시피 앱(쿠킹하우스 등)을 활용해 제철 채소가 들어간 건강 점심 메뉴를 직접 만들어봅니다.",duration:"40분",time:"오전 11시"},{category:"뉴스",categoryEmoji:"🌏",title:"주간 국제 뉴스 요약 읽기",desc:"한 주 동안 세계에서 일어난 주요 사건을 정리한 주간 뉴스레터나 요약 기사를 읽습니다.",duration:"20분",time:"오후 2시"},{category:"휴식&소통",categoryEmoji:"🎬",title:"넷플릭스·OTT 영화 관람",desc:"가족과 함께 또는 혼자서 좋아하는 한국 영화나 드라마를 편안하게 감상하며 주말을 맞이합니다.",duration:"120분",time:"오후 7시"}]},
      { day:"토요일",dayEn:"Saturday",emoji:"🌸",activities:[{category:"학습",categoryEmoji:"📚",title:"이번 주 AI 학습 복습",desc:"월요일부터 금요일까지 배운 AI 내용을 공책에 간단히 정리하며 기억을 되살리고 질문을 적어봅니다.",duration:"30분",time:"오전 10시"},{category:"건강",categoryEmoji:"🚴",title:"자전거 타기 또는 등산",desc:"날씨가 좋은 주말에 가벼운 자전거 나들이나 낮은 산 둘레길을 걸으며 자연 속에서 충전합니다.",duration:"60분",time:"오전 9시"},{category:"뉴스",categoryEmoji:"📡",title:"AI 미래 전망 영상 시청",desc:"유튜브에서 '미래의 AI 세상' 관련 다큐멘터리나 전문가 강연 영상을 찾아 흥미롭게 시청합니다.",duration:"40분",time:"오후 2시"},{category:"휴식&소통",categoryEmoji:"🍽️",title:"가족 외식 또는 집밥 나눔",desc:"가족이 모여 함께 식사를 하거나 이웃에게 음식을 나눠주며 따뜻한 주말 오후를 보냅니다.",duration:"90분",time:"오후 6시"}]},
      { day:"일요일",dayEn:"Sunday",emoji:"☀️",activities:[{category:"학습",categoryEmoji:"🔮",title:"다음 주 AI 학습 계획 세우기",desc:"챗GPT에게 '다음 주에 AI에 대해 무엇을 배우면 좋을까요?'라고 질문하며 다음 주 학습 목표를 정합니다.",duration:"20분",time:"오전 11시"},{category:"건강",categoryEmoji:"🛀",title:"반신욕 또는 족욕",desc:"따뜻한 물에 족욕이나 반신욕을 하며 한 주간 쌓인 피로를 풀고 혈액순환을 돕습니다.",duration:"30분",time:"오후 4시"},{category:"뉴스",categoryEmoji:"📖",title:"주간 AI 트렌드 요약 읽기",desc:"'AI 타임스'나 'IT동아' 같은 IT 전문 매체에서 이번 주 AI 트렌드 요약 기사를 가볍게 읽습니다.",duration:"20분",time:"오전 10시"},{category:"휴식&소통",categoryEmoji:"🙏",title:"종교 활동 또는 명상",desc:"교회·절·성당 예배에 참여하거나 조용한 명상으로 한 주를 마무리하며 마음의 평화를 찾습니다.",duration:"60분",time:"오전 9시"}]}
    ];

    // Map JS Date.getDay() (0=Sun,1=Mon,...,6=Sat) to weeklyPlan index (0=Mon,...,6=Sun)
    function getTodayPlanIndex() {
      const jsDay = new Date().getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
      if (jsDay === 0) return 6; // Sunday -> index 6
      return jsDay - 1;           // Mon=0, Tue=1, ..., Sat=5
    }

    function getBadgeClass(category) {
      if (category === '학습') return 'badge--학습';
      if (category === '건강') return 'badge--건강';
      if (category === '뉴스') return 'badge--뉴스';
      return 'badge--휴식';
    }

    function renderCards() {
      const grid = document.getElementById('daysGrid');
      const todayIdx = getTodayPlanIndex();
      grid.innerHTML = '';

      weeklyPlan.forEach((dayData, idx) => {
        const isToday = idx === todayIdx;
        const card = document.createElement('div');
        card.className = 'day-card' + (isToday ? ' day-card--today' : '');
        card.dataset.index = idx;

        // Header
        const headerHTML = `
          <div class="day-card__header">
            <div>
              <div class="day-name">${dayData.emoji} ${dayData.day}</div>
              <div class="day-date">${dayData.dayEn}</div>
            </div>
            ${isToday ? '<span class="today-badge">오늘</span>' : ''}
          </div>
        `;

        // Body: activity rows
        const activitiesHTML = dayData.activities.map(act => `
          <div class="activity-row">
            <div class="activity-row__top">
              <span class="badge ${getBadgeClass(act.category)}">${act.categoryEmoji} ${act.category}</span>
              <span class="duration-pill">${act.duration}</span>
            </div>
            <div class="activity-title">${act.title}</div>
          </div>
        `).join('');

        card.innerHTML = headerHTML + `<div class="day-card__body">${activitiesHTML}</div>`;
        grid.appendChild(card);
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('toast--visible');
      setTimeout(() => {
        toast.classList.remove('toast--visible');
      }, 2500);
    }

    function openTodayModal() {
      const todayIdx = getTodayPlanIndex();
      const dayData = weeklyPlan[todayIdx];

      document.getElementById('modalTitle').textContent = dayData.emoji + ' ' + dayData.day;
      document.getElementById('modalDate').textContent = dayData.dayEn + ' · 오늘의 활동';

      const body = document.getElementById('modalBody');
      body.innerHTML = dayData.activities.map(act => `
        <div class="modal-activity-row">
          <div class="modal-activity-row__top">
            <span class="badge ${getBadgeClass(act.category)}">${act.categoryEmoji} ${act.category}</span>
            <div class="modal-activity-row__meta">
              <span class="time-pill">${act.time}</span>
              <span class="duration-pill">${act.duration}</span>
            </div>
          </div>
          <div class="activity-title">${act.title}</div>
          <div class="modal-activity-desc">${act.desc}</div>
        </div>
      `).join('');

      document.getElementById('todayModal').classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('todayModal').classList.remove('is-open');
      document.body.style.overflow = '';
    }

    // Generate button: animate cards and show toast
    document.getElementById('btnGenerate').addEventListener('click', () => {
      const cards = document.querySelectorAll('.day-card');
      cards.forEach((card, i) => {
        card.style.animationDelay = (i * 40) + 'ms';
        card.classList.remove('day-card--refreshing');
        // Force reflow
        void card.offsetWidth;
        card.classList.add('day-card--refreshing');
      });
      // Clean up animation classes after animation ends
      setTimeout(() => {
        cards.forEach(card => {
          card.classList.remove('day-card--refreshing');
          card.style.animationDelay = '';
        });
      }, 800);
      showToast('✅ 이번 주 계획이 준비되었습니다!');
    });

    // Today button: open modal
    document.getElementById('btnToday').addEventListener('click', openTodayModal);

    // Modal close button
    document.getElementById('modalClose').addEventListener('click', closeModal);

    // Close modal on overlay background click
    document.getElementById('todayModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('todayModal')) {
        closeModal();
      }
    });

    // Escape key closes modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // Initial render
    renderCards();
  </script>
</body>
</html>
